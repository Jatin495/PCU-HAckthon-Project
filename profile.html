<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SmartClass Monitor</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">SC</div>
                <div>
                    <h3 style="font-size: 1rem; margin: 0;">SmartClass</h3>
                    <p style="font-size: 0.75rem; opacity: 0.8; margin: 0;">Monitor</p>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    Dashboard
                </a>
                <a href="live_class.html" class="nav-item">
                    <span class="nav-icon">📹</span>
                    Live Classroom
                </a>
                <a href="attendance.html" class="nav-item">
                    <span class="nav-icon">✓</span>
                    Attendance
                </a>
                <a href="student.html" class="nav-item">
                    <span class="nav-icon">👥</span>
                    Students
                </a>
                <a href="reports.html" class="nav-item">
                    <span class="nav-icon">📄</span>
                    Reports
                </a>
                <a href="analytics.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    Analytics
                </a>
                <a href="settings.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    Settings
                </a>
                <a href="#" onclick="logout()" class="nav-item" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                    <span class="nav-icon">🚪</span>
                    Logout
                </a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="navbar-left">
                    <button id="menuToggle" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; display: none;">☰</button>
                    <h1 style="font-size: 1.5rem; font-weight: 600;">My Profile</h1>
                    <span id="backendStatus" style="font-size: 0.7rem; margin-left: 1rem; padding: 0.2rem 0.6rem; background: rgba(255,255,255,0.05); border-radius: 20px;">⏳ Connecting...</span>
                </div>
                
                <div class="navbar-right">
                    <div class="search-bar">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Search..." id="generalSearch">
                    </div>
                    
                    <a href="notifications.html" class="notification-bell text-decoration-none" style="text-decoration:none;">
                        <span style="font-size: 1.25rem;">🔔</span>
                        <span class="notification-badge">3</span>
                    </a>
                    
                    <a href="profile.html" class="user-menu" style="text-decoration: none; color: inherit;">
                        <div class="user-avatar" id="userAvatar">T</div>
                        <div>
                            <div id="userName" style="font-size: 0.875rem; font-weight: 500;">Teacher</div>
                            <div style="font-size: 0.75rem; color: var(--text-secondary);">Online</div>
                        </div>
                    </a>
                </div>
            </header>
            
            <!-- Page Content -->
            <div class="page-content">
                <div class="grid grid-cols-2" style="gap: 1.5rem;">
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <h2 class="card-title">Profile Information</h2>
                                <p class="card-subtitle">Manage your personal data</p>
                            </div>
                        </div>
                        
                        <div style="margin-top: 1rem;">
                            <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem;">
                                <div class="student-avatar" id="profileAvatar" style="width: 80px; height: 80px; font-size: 2rem; background: var(--primary-color);">T</div>
                                <div>
                                    <h3 id="profileName" style="font-size: 1.25rem; margin-bottom: 0.5rem; font-weight: 600;">Teacher Account</h3>
                                    <span class="badge badge-success">Active Educator</span>
                                </div>
                            </div>
                            
                            <form id="profileForm" style="display: flex; flex-direction: column; gap: 1rem;">
                                <div>
                                    <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem;">Full Name</label>
                                    <input type="text" class="form-input" id="inputName" value="Teacher Account" style="width: 100%;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem;">Email Address</label>
                                    <input type="email" class="form-input" id="inputEmail" value="teacher@smartclass.edu" style="width: 100%;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem;">Subject</label>
                                    <input type="text" class="form-input" value="Computer Science" style="width: 100%;">
                                </div>
                                <div style="margin-top: 1rem;">
                                    <button type="button" class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="api.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('currentUser');
            if (userStr) {
                const user = JSON.parse(userStr);
                document.getElementById('inputName').value = user.name || 'Teacher Account';
                document.getElementById('inputEmail').value = user.email || 'teacher@smartclass.edu';
                document.getElementById('profileName').textContent = user.name || 'Teacher Account';
                
                const initials = (user.name || 'T').split(' ').map(n=>n[0]).join('').toUpperCase();
                document.getElementById('profileAvatar').textContent = initials;
            }
        });

        function saveProfile() {
            if (window.SmartClassMonitor && window.SmartClassMonitor.showAlert) {
                window.SmartClassMonitor.showAlert('Profile saved successfully!', 'success');
            }
        }
    </script>
</body>
</html>
