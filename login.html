<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartClass Monitor</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card fade-in">
            <div class="login-header">
                <div class="logo" style="margin: 0 auto 1rem;">SC</div>
                <h1 class="login-title">SmartClass Monitor</h1>
                <p class="login-subtitle">AI Classroom Engagement System</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="teacher@school.edu"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="remember" name="remember" style="width: auto;">
                        <span style="font-size: 0.875rem; color: var(--text-secondary);">Remember me</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1rem;">
                    Sign In
                </button>
                
                <div style="text-align: center; margin-top: 1.5rem;">
                    <a href="#" style="color: var(--primary-color); text-decoration: none; font-size: 0.875rem;">
                        Forgot your password?
                    </a>
                </div>
            </form>
            
            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); text-align: center;">
                <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                    Demo Credentials:
                </p>
                <p style="font-size: 0.75rem; color: var(--text-secondary);">
                    Email: teacher@school.edu | Password: any password
                </p>
            </div>
        </div>
    </div>
    
    <script src="api.js"></script>
    <script src="main.js"></script>
    <script>
        // Override login to use backend
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = this.querySelector('button[type="submit"]');
            btn.textContent = 'Signing In...';
            btn.disabled = true;

            try {
                const result = await window.SmartClassAPI.loginWithBackend(email, password);
                if (result && result.success) {
                    const teacher = result.teacher;
                    localStorage.setItem('currentUser', JSON.stringify({
                        id: teacher.id,
                        name: teacher.name,
                        email: teacher.email,
                        role: 'teacher'
                    }));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(result?.error || 'Login failed. Please try again.');
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            } catch(err) {
                // Fallback to demo login if backend fails
                if (email && password) {
                    localStorage.setItem('currentUser', JSON.stringify({
                        id: 'demo001', name: 'Demo Teacher', email, role: 'teacher'
                    }));
                    window.location.href = 'dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
